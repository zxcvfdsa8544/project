<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>下拉式選單 select</title>
</head>
<body>
    <h1>請選擇一個城市</h1>
    <form action="">
        <select name="" id="">
            <option value="tokyo">東京</option>
            <option value="b">巴黎</option>
            <option value="n">紐約</option>
        </select>
        <br>
        <input type="submit" value="送出">
    </form>
</body>
</html>
