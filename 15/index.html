<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>粗體元素、強調元素、斜體元素和em元素</title>
</head>
<body>
    <p>一般文字</p>
    <p><b>這是粗體元素</b></p>
    <p><strong>這是強調元素</strong></p>  比 b 有語意話，對視障人士有更強調的語意
    <p><i>這是斜體元素</i></p>
    <p><em>這是 em 元素</em></p>  比 i 有語意話，對視障人士有更強調的語意
</body>
</html>
