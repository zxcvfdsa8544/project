<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML 表單(Form) 文字輸入區塊 textarea</title>
</head>
<body>
    <h1>歡迎來到我的網頁</h1>
    <form action="">
        <label for="comment">評論或反饋</label>
        <br>
        <textarea name="comment" id="comment"></textarea>
        <br>
        <input type="submit" value="提交">
    </form>
</body>
</html>
