<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>無序列表 ul 與有序列表 ol</title>
</head>
<body>
    <h2>無序列表</h2>
    <ul>
        <li>CD</li>
        <li>DVD</li>
        <li>藍光</li>
    </ul>

    <h2>有序列表</h2>
    <ol>
        <li>CD</li>
        <li>DVD</li>
        <li>藍光</li>
    </ol>
</body>
</html>
