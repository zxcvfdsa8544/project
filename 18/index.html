<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>div 元素與 span 元素</title>
</head>
<body>
    <!-- 塊級容器元素 -->
     <div style="background-color: blue;">
        第一區塊
    </div>
    <div style="background-color: red;">
        第2個區塊
    </div>
    <!-- 行內元素 -->
    <span style="background-color: orange;">我是第一個 span</span>
    <span style="background-color: green;">我是第二個 span</span>
    <span style="background-color: orange;">我是第一個 span</span>
    <span style="background-color: green;">我是第二個 span</span>
    <span style="background-color: orange;">我是第一個 span</span>
    <span style="background-color: green;">我是第二個 span</span>
</body>
</html>
